name: haqeeqa_wala_khorafa
description: Arabic quiz app - حقيقة ولا خرافة؟
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # HTTP & API
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Network
  connectivity_plus: ^5.0.2
  
  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  shimmer: ^3.0.0
  audioplayers: ^5.2.1
  
  # UI
  flutter_svg: ^2.0.9

  # Firebase
  firebase_core: ^4.7.0
  firebase_messaging: 16.2.0
  firebase_crashlytics: 5.2.0
  firebase_analytics: ^12.3.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/sounds/
  
  fonts:
    - family: Somar
      fonts:
        - asset: assets/fonts/Somar-Regular.otf
          weight: 400
        - asset: assets/fonts/Somar-Medium.otf
          weight: 500
        - asset: assets/fonts/Somar-Bold.otf
          weight: 700
