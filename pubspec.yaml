name: fact_or_myth
description: Quiz App - حقيقة ولا خرافة؟
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # HTTP & API
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Network
  connectivity_plus: ^5.0.2
  
  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.2
  share_plus: ^13.1.0
  shimmer: ^3.0.0
  audioplayers: ^5.2.1
  
  # UI
  flutter_svg: ^2.0.9

  # Firebase
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_crashlytics: ^5.2.0
  firebase_analytics: ^12.3.0

  # In-App Review
  in_app_review: ^2.0.11


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/sounds/
    - assets/images/
  
  fonts:
    - family: Somar
      fonts:
        - asset: assets/fonts/Somar-Regular.otf
          weight: 400
        - asset: assets/fonts/Somar-Medium.otf
          weight: 500
        - asset: assets/fonts/Somar-Bold.otf
          weight: 700
